name: Python Setup

on:
  push:

jobs:
  python-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install pytest flake8

      - name: Verify Python Version
        run: python --version

      - name: Verify Flake8
        run: flake8 --version

      - name: Verify Pytest
        run: pytest --version
